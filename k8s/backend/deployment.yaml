# 10. DEPLOYMENT - FastAPI backend with all K8s features
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-backend
  namespace: task-manager
  labels:
    app: fastapi-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-backend
  # Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # 1 extra pod during update
      maxUnavailable: 0     # zero downtime
  template:
    metadata:
      labels:
        app: fastapi-backend
    spec:
      # INIT CONTAINER - waits for DB to be ready before starting app
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo "waiting for db..."; sleep 2; done']

      containers:
      - name: fastapi
        image: task-manager-api:v1
        imagePullPolicy: Never    # for local minikube images
        ports:
        - containerPort: 8000

        # ENV from ConfigMap
        envFrom:
        - configMapRef:
            name: app-config

        # ENV from Secret
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD

        # Resource requests & limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        # LIVENESS PROBE - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

        # READINESS PROBE - remove from service if not ready
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        # STARTUP PROBE - give slow-starting containers time
        startupProbe:
          httpGet:
            path: /healthz
            port: 8000
          failureThreshold: 30
          periodSeconds: 2
