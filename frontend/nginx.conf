server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Reverse proxy API calls to the backend service
    location /api/ {
        proxy_pass http://backend-service.task-manager.svc.cluster.local/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
